apiVersion: batch/v1
kind: Job
metadata:
  name: whale-doctor-check
  namespace: deepseek-code-whale
  labels:
    app.kubernetes.io/name: deepseek-code-whale
    app.kubernetes.io/component: whale
    app.kubernetes.io/managed-by: autopoc
    poc.autopoc/scenario: doctor-check
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deepseek-code-whale
        app.kubernetes.io/component: whale
        poc.autopoc/scenario: doctor-check
    spec:
      containers:
        - name: whale
          image: quay.io/aicatalyst/deepseek-code-whale-whale:latest
          imagePullPolicy: Always
          command: ["whale"]
          args: ["doctor"]
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: whale-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
